name: Channel Manager Integration Tests

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  channex-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run Channex sandbox integration tests
        env:
          CHANNEX_API_KEY: ${{ secrets.CHANNEX_API_KEY }}
        run: npx playwright test tests/api/availability.spec.ts --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channex-playwright-report
          path: playwright-report/
          retention-days: 14
