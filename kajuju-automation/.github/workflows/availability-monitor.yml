name: Availability Monitor

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: kajuju-automation

jobs:
  check-availability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run availability checks
        id: availability
        env:
          SMOOBU_API_KEY: ${{ secrets.SMOOBU_API_KEY }}
        run: npx playwright test tests/api/availability.spec.ts --reporter=list

      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: '🚨 URGENT - Idan Barn Suites Double Booking Detected!'
          to: ${{ secrets.ALERT_EMAIL }}
          from: Kajuju Monitor
          body: |
            A double booking has been detected in your Smoobu calendar.

            Check the overlap details in the GitHub Actions run log:
            https://github.com/skambo/kajuju-automation/actions

            Then fix it immediately in Smoobu:
            https://login.smoobu.com/en/calendar

            Remember: always block dates in Smoobu — never directly on Airbnb or Booking.com.