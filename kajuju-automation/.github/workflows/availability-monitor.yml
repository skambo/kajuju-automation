name: Site Uptime Monitor

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  check-uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run site uptime checks
        run: npx playwright test tests/monitoring/health-check.spec.ts --reporter=html

      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: '🚨 URGENT - Idan Barn Suites Site Down!'
          to: ${{ secrets.ALERT_EMAIL }}
          from: Kajuju Monitor
          body: |
            One or more pages on rates.idanbarnsuites.com failed the uptime check!

            Check the site: https://rates.idanbarnsuites.com

            Run the full report locally:
            npx playwright test tests/monitoring/health-check.spec.ts
